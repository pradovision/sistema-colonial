<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prado Vision Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl tracking-tighter">PRADO VISION PRO</h1>
            <div class="space-x-4 text-sm font-medium">
                <button onclick="showTab('tab-vendas')" class="hover:text-blue-200">Vendas</button>
                <button onclick="showTab('tab-clientes')" class="hover:text-blue-200">Clientes</button>
                <button onclick="showTab('tab-produtos')" class="hover:text-blue-200">Produtos</button>
                <button onclick="showTab('tab-dash')" class="hover:text-blue-200">Dashboard</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">

        <section id="tab-vendas" class="tab-content space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h2 class="text-xl font-bold mb-4 text-gray-800">Nova Venda</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <select id="venda-cliente" class="p-2 border rounded shadow-sm"></select>
                    <div class="flex gap-2">
                        <select id="venda-produto" class="flex-1 p-2 border rounded shadow-sm"></select>
                        <input id="venda-qtd" type="number" placeholder="Qtd" class="w-20 p-2 border rounded shadow-sm">
                        <button onclick="addItemCarrinho()" class="bg-blue-600 text-white px-4 py-2 rounded font-bold">+</button>
                    </div>
                </div>

                <div class="mt-6 border-t pt-4">
                    <table class="w-full text-left">
                        <thead><tr class="text-gray-400 text-xs uppercase"><th>Produto</th><th>Qtd</th><th>Preço</th><th>Subtotal</th></tr></thead>
                        <tbody id="carrinho-corpo"></tbody>
                    </table>
                    <div class="text-right mt-4 space-y-1">
                        <p class="text-gray-500 text-sm">Total: <span id="venda-total" class="font-bold text-gray-900 text-xl">R$ 0,00</span></p>
                        <p class="text-green-500 text-xs italic">Lucro estimado: <span id="venda-lucro">R$ 0,00</span></p>
                    </div>
                    <button onclick="finalizarVenda()" class="w-full mt-4 bg-green-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-green-700">FINALIZAR E GERAR RECIBO</button>
                </div>
            </div>
        </section>

        <section id="tab-clientes" class="tab-content hidden space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h2 class="text-xl font-bold mb-4">Cadastro de Clientes</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input id="c-nome" placeholder="Nome Completo" class="p-2 border rounded">
                    <input id="c-tel" placeholder="Telefone/WhatsApp" class="p-2 border rounded">
                    <input id="c-end" placeholder="Endereço" class="p-2 border rounded md:col-span-2">
                    <textarea id="c-obs" placeholder="Observações" class="p-2 border rounded md:col-span-2"></textarea>
                    <button onclick="salvarCliente()" class="bg-blue-600 text-white p-2 rounded font-bold md:col-span-2">Salvar Cliente</button>
                </div>
            </div>
        </section>

        <section id="tab-produtos" class="tab-content hidden space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h2 class="text-xl font-bold mb-4">Cadastro de Produtos</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <input id="p-nome" placeholder="Nome do Produto" class="p-2 border rounded">
                    <select id="p-un" class="p-2 border rounded"><option value="un">Unidade (un)</option><option value="kg">Quilo (kg)</option></select>
                    <input id="p-compra" type="number" placeholder="Valor Compra (R$)" class="p-2 border rounded">
                    <input id="p-venda" type="number" placeholder="Valor Venda (R$)" class="p-2 border rounded">
                    <input id="p-estoque" type="number" placeholder="Estoque Inicial" class="p-2 border rounded">
                    <button onclick="salvarProduto()" class="bg-blue-600 text-white p-2 rounded font-bold">Cadastrar</button>
                </div>
            </div>
            <div id="lista-produtos-estoque" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="tab-dash" class="tab-content hidden grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-blue-700 text-white p-8 rounded-2xl shadow-xl">
                <p class="opacity-70 uppercase text-xs font-bold tracking-widest">Faturamento Bruto</p>
                <h3 id="dash-faturamento" class="text-4xl font-black">R$ 0,00</h3>
            </div>
            <div class="bg-emerald-600 text-white p-8 rounded-2xl shadow-xl">
                <p class="opacity-70 uppercase text-xs font-bold tracking-widest">Lucro Líquido</p>
                <h3 id="dash-lucro" class="text-4xl font-black">R$ 0,00</h3>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
